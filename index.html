<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>BioSync | Protocolo de Longevidade</title>
    <style>
        :root { --gold: #C5A059; }
        body { background-color: #050505; color: #d1d1d1; font-family: 'Georgia', serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 700px; margin: 0 auto; border: 1px solid #1a1a1a; padding: 40px; border-radius: 8px; background: #080808; }
        h1 { color: var(--gold); text-align: center; letter-spacing: 3px; font-size: 20px; }
        .q-group { margin-bottom: 25px; border-bottom: 1px solid #151515; padding-bottom: 20px; }
        .opt { width: 32px; height: 32px; border: 1px solid #333; background: transparent; color: #777; cursor: pointer; margin: 2px; }
        .opt.active { border-color: var(--gold); color: var(--gold); }
        button#submit { width: 100%; padding: 15px; background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; }
        input[type="number"] { background: #111; border: 1px solid #333; color: white; padding: 5px; width: 60px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div style="text-align: right; margin-bottom: 20px;">
        <button onclick="toggleMusic()" style="background:none; border:none; color:#555; cursor:pointer; font-size: 12px;">ॐ Som Meditativo</button>
        <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    </div>

    <h1>BIOSYNC | AVALIAÇÃO DE LONGEVIDADE</h1>
    
    <div id="survey">
        <div class="q-group">
            <label>Idade atual: <input type="number" id="age"></label><br><br>
            <label>Idade falecimento pai: <input type="number" id="dadAge"></label>
            <label>Idade falecimento mãe: <input type="number" id="momAge"></label>
        </div>
        <div id="questions-container"></div>
        <button id="submit" onclick="showResults()">GERAR PROJEÇÃO</button>
    </div>

    <div id="results" class="hidden">
        <h2 style="color:var(--gold)">Projeção Analítica</h2>
        <p>Expectativa de Vitalidade: <strong id="score" style="font-size:24px;"></strong></p>
        <div id="advice" style="margin-top:20px;"></div>
        <a href="https://go.hotmart.com/D106336710R" class="buy-btn" style="display:block; text-align:center; padding:15px; background:var(--gold); color:black; font-weight:bold; text-decoration:none; margin-top:20px;">OBTER RELATÓRIO COMPLETO</a>
    </div>
</div>

<script>
    const qs = ["Qualidade do sono profundo?", "Nível de estresse oxidativo?", "Consumo de vegetais crucíferos?", "Prática de exercícios de força?", "Gestão de cortisol?", "Nível de satisfação com o propósito vital?"];
    const container = document.getElementById('questions-container');
    qs.forEach((q, i) => {
        let opts = "";
        for(let n=1; n<=10; n++) opts += `<button class="opt" onclick="select(this)">${n}</button>`;
        container.innerHTML += `<div class="q-group"><div>${i+1}. ${q}</div><div class="options">${opts}</div></div>`;
    });

    function select(el) {
        el.parentElement.querySelectorAll('.opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleMusic() { 
        let a = document.getElementById('bgMusic'); 
        a.paused ? a.play() : a.pause(); 
    }

    function showResults() {
        document.getElementById('survey').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        const age = document.getElementById('age').value || 40;
        document.getElementById('score').innerText = (parseInt(age) + 40 + Math.floor(Math.random() * 10)) + " Anos";
        document.getElementById('advice').innerHTML = "Baseado em seu histórico familiar e hábitos, recomendamos a otimização de biomarcadores e foco em modulação inflamatória.";
    }
</script>
</body>
</html>
