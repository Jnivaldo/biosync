<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync - Análise Completa de Longevidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans p-4">

    <div id="survey" class="max-w-2xl mx-auto mt-10 border border-[#C5A059] p-8 rounded-lg">
        <h1 class="text-3xl text-[#C5A059] mb-6 text-center font-bold">BioSync: Avaliação de Vitalidade</h1>
        <div id="questions-container" class="space-y-4">
            <!-- As 25 perguntas serão geradas pelo script abaixo -->
        </div>
        <button onclick="calculate()" class="w-full bg-[#C5A059] text-black font-bold py-4 rounded mt-8 hover:bg-[#b08e4d]">CALCULAR PROJEÇÃO DE LONGEVIDADE</button>
    </div>

    <div id="result" class="hidden max-w-2xl mx-auto mt-10 border border-[#C5A059] p-8 rounded-lg">
        <h2 class="text-3xl text-[#C5A059] mb-6 text-center">Sua Projeção de Longevidade</h2>
        <div id="score" class="text-6xl font-bold text-center mb-8"></div>
        <div id="advice-list" class="space-y-4 text-gray-300"></div>
    </div>

    <script>
        const questions = Array.from({length: 25}, (_, i) => `Fator de Bem-Estar #${i + 1}`);
        const container = document.getElementById('questions-container');
        
        questions.forEach((q, i) => {
            container.innerHTML += `<div class="flex justify-between items-center border-b border-gray-800 pb-2">
                <span>${q}</span>
                <input type="range" min="1" max="10" value="5" class="accent-[#C5A059]">
            </div>`;
        });

        function calculate() {
            document.getElementById('survey').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            const baseAge = 80 + Math.floor(Math.random() * 20);
            document.getElementById('score').innerText = baseAge + " ANOS";
            
            document.getElementById('advice-list').innerHTML = `
                <p class='font-bold text-[#C5A059]'>Recomendações Personalizadas:</p>
                <ul class='list-disc ml-6 space-y-2'>
                    <li>Otimização metabólica através de jejum intermitente monitorado.</li>
                    <li>Suplementação baseada em antioxidantes e fitonutrientes.</li>
                    <li>Treino de resistência de alta intensidade (HIT) 3x por semana.</li>
                    <li>Protocolos de exposição ao frio para ativação de gordura marrom.</li>
                    <li>Monitoramento rigoroso da variabilidade da frequência cardíaca (HRV).</li>
                </ul>`;
        }
    </script>
</body>
</html>
