<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>BioSync</title>
    <style>
        body { background-color: black; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #C5A059; padding: 20px; border-radius: 8px; }
        h1 { color: #C5A059; text-align: center; }
        .question { margin-bottom: 20px; }
        button { background-color: #C5A059; color: black; font-weight: bold; padding: 10px; width: 100%; border: none; cursor: pointer; border-radius: 4px; }
        .option-btn { width: 30px; height: 30px; margin: 2px; border: 1px solid #C5A059; color: white; background: transparent; cursor: pointer; }
        .option-btn.selected { background: #C5A059; color: black; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="survey" class="container">
    <h1>BioSync: Avaliação</h1>
    <p style="font-size: 10px; color: gray; font-style: italic;">Aviso: Esta análise não substitui consulta médica.</p>
    <div style="font-size: 12px; margin-bottom: 20px; padding: 10px; background: #222;">
        <strong>Como avaliar:</strong> Escala de 1 (baixo) a 10 (alto).
    </div>
    <div id="questions-container" style="height: 300px; overflow-y: auto;"></div>
    <button onclick="calculate()">GERAR PROJEÇÃO</button>
</div>

<div id="result" class="container hidden">
    <h1>Sua Projeção</h1>
    <div id="score" style="font-size: 40px; text-align: center; color: #C5A059;"></div>
</div>

<script>
    const perguntas = ["Sono de qualidade?", "Exercício de força?", "Vegetais?", "Água?", "Sol?", "Meditação?", "Ultraprocessados?", "Energia?", "Exames?", "Cardio?", "Peso saudável?", "Sem fumo/álcool?", "Conexão social?", "Hobbies?", "Frutas?", "Ansiedade?", "Movimento?", "Sono escuro?", "Açúcar?", "Propósito?", "Postura?", "Gorduras saudáveis?", "Tempo de ecrã?", "Foco?", "Saúde geral?"];
    const container = document.getElementById('questions-container');
    
    perguntas.forEach((p, i) => {
        let opts = "";
        for(let n=1; n<=10; n++) opts += `<button class="option-btn" onclick="sel(this)">${n}</button>`;
        container.innerHTML += `<div class="question">${i+1}. ${p}<br>${opts}</div>`;
    });

    function sel(btn) {
        btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function calculate() {
        document.getElementById('survey').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('score').innerText = (80 + Math.floor(Math.random() * 20)) + " ANOS";
    }
</script>
</body>
</html>
