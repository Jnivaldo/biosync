<body>

<div class="wrapper">
    <!-- Seletor de Idioma -->
    <div style="text-align: center; margin-bottom: 20px;">
        <button onclick="setLang('pt')" style="background:none; border:1px solid #C5A059; color:#C5A059; cursor:pointer; padding:5px;">PT</button>
        <button onclick="setLang('en')" style="background:none; border:1px solid #C5A059; color:#C5A059; cursor:pointer; padding:5px;">EN</button>
        <button onclick="setLang('es')" style="background:none; border:1px solid #C5A059; color:#C5A059; cursor:pointer; padding:5px;">ES</button>
    </div>

    <h1 id="title">BIOSYNC | PROTOCOLO DE LONGEVIDADE</h1>
    
    <div id="survey">
        <div class="q-group" style="padding:10px; border:1px solid #222;">
            <label>Idade: <input type="number" id="age"></label>
            <label>Pai (falecimento): <input type="number" id="dadAge"></label>
            <label>Mãe (falecimento): <input type="number" id="momAge"></label>
        </div>
        <div id="questions-container"></div>
        <button id="submit" onclick="showResults()">GERAR PROJEÇÃO</button>
    </div>

    <div id="results" class="hidden">
        <h2 id="res-title" style="color:var(--gold)">Projeção Analítica</h2>
        <p id="res-text">Expectativa: <strong id="score" style="font-size:24px;"></strong></p>
        <a href="https://go.hotmart.com/D106336710R" style="display:block; text-align:center; padding:15px; background:var(--gold); color:black; font-weight:bold; text-decoration:none; margin-top:20px;">OBTER RELATÓRIO COMPLETO</a>
    </div>
</div>

<script>
    const i18n = {
        'pt': {
            title: "BIOSYNC | PROTOCOLO DE LONGEVIDADE",
            btn: "GERAR PROJEÇÃO",
            res: "Projeção Analítica",
            qs: ["Qualidade do sono profundo?", "Nível de estresse oxidativo?", "Consumo de vegetais crucíferos?", "Prática de exercícios de força?", "Gestão de cortisol?", "Propósito vital?", "Hidratação?", "Exposição solar?", "Mindfulness?", "Ingestão de açúcares?", "Recuperação?", "Biomarcadores?", "Atividade aeróbica?", "Composição corporal?", "Toxinas?", "Engajamento social?", "Estímulo cognitivo?", "Diversidade de frutas?", "Mobilidade?", "Higiene luminosa?", "Aditivos?", "Postura biomecânica?", "Gorduras saudáveis?", "Foco?", "Saúde metabólica?"]
        },
        'en': {
            title: "BIOSYNC | LONGEVITY PROTOCOL",
            btn: "GENERATE PROJECTION",
            res: "Analytical Projection",
            qs: ["Deep sleep quality?", "Oxidative stress level?", "Cruciferous vegetable intake?", "Resistance training?", "Cortisol management?", "Vital purpose?", "Hydration?", "Sun exposure?", "Mindfulness?", "Sugar intake?", "Recovery?", "Biomarkers?", "Aerobic activity?", "Body composition?", "Toxins?", "Social engagement?", "Cognitive stimulation?", "Fruit diversity?", "Mobility?", "Light hygiene?", "Additives?", "Biomechanical posture?", "Healthy fats?", "Focus?", "Metabolic health?"]
        },
        'es': {
            title: "BIOSYNC | PROTOCOLO DE LONGEVIDAD",
            btn: "GENERAR PROYECCIÓN",
            res: "Proyección Analítica",
            qs: ["¿Calidad del sueño profundo?", "¿Nivel de estrés oxidativo?", "¿Consumo de vegetales crucíferos?", "¿Ejercicio de fuerza?", "¿Gestión del cortisol?", "¿Propósito vital?", "¿Hidratación?", "¿Exposición solar?", "¿Mindfulness?", "¿Ingesta de azúcares?", "¿Recuperación?", "¿Biomarcadores?", "¿Actividad aeróbica?", "¿Composición corporal?", "¿Toxinas?", "¿Compromiso social?", "¿Estímulo cognitivo?", "¿Diversidad de frutas?", "¿Movilidad?", "¿Higiene lumínica?", "¿Aditivos?", "¿Postura biomecánica?", "¿Grasas saludables?", "¿Enfoque?", "¿Salud metabólica?"]
        }
    };

    function setLang(lang) {
        document.getElementById('title').innerText = i18n[lang].title;
        document.getElementById('submit').innerText = i18n[lang].btn;
        document.getElementById('res-title').innerText = i18n[lang].res;
        const qElements = document.querySelectorAll('.q-text');
        i18n[lang].qs.forEach((text, i) => { if(qElements[i]) qElements[i].innerText = (i + 1) + ". " + text; });
    }

    const container = document.getElementById('questions-container');
    i18n['pt'].qs.forEach((q, i) => {
        let opts = "";
        for(let n=1; n<=10; n++) opts += `<button class="opt" onclick="select(this)">${n}</button>`;
        container.innerHTML += `<div class="q-group"><div class="q-text">${i+1}. ${q}</div><div class="options">${opts}</div></div>`;
    });

    function select(el) { el.parentElement.querySelectorAll('.opt').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function showResults() { document.getElementById('survey').classList.add('hidden'); document.getElementById('results').classList.remove('hidden'); document.getElementById('score').innerText = (78 + Math.floor(Math.random() * 22)) + " Anos"; }
</script>
</body>
