<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSync | Longevity Protocol</title>
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --bg: #0A0A0A; --text: #E0E0E0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #121212; padding: 40px; border-radius: 12px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); text-align: center; letter-spacing: 2px; margin-bottom: 30px; }
        .lang-btns { text-align: center; margin-bottom: 20px; }
        .lang-btns button { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; margin: 0 5px; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .lang-btns button:hover { background: var(--gold); color: black; }
        .q-group { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .q-text { margin-bottom: 10px; font-weight: 300; }
        .options { display: flex; gap: 5px; flex-wrap: wrap; }
        .opt { width: 35px; height: 35px; border: 1px solid #333; background: #1A1A1A; color: #888; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .opt:hover { border-color: var(--gold); }
        .opt.active { background: var(--gold); color: black; border-color: var(--gold); }
        #submit { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px; }
        .hidden { display: none; }
        input { background: #1A1A1A; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-btns">
        <button onclick="setLang('pt')">PT</button>
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('es')">ES</button>
    </div>

    <h1 id="title">BIOSYNC | PROTOCOLO DE LONGEVIDADE</h1>
    
    <div id="survey">
        <div style="margin-bottom: 20px; text-align: center;">
            <input type="number" id="age" placeholder="Idade">
        </div>
        <div id="questions-container"></div>
        <button id="submit" onclick="showResults()">GERAR PROJEÇÃO</button>
    </div>

    <div id="results" class="hidden" style="text-align: center;">
        <h2 id="res-title" style="color:var(--gold); font-family: 'Playfair Display', serif;">Projeção Analítica</h2>
        <p>Expectativa: <strong id="score" style="font-size: 28px; color: var(--gold);"></strong></p>
        <a href="https://go.hotmart.com/D106336710R" style="display:inline-block; margin-top:20px; padding:15px 30px; background:var(--gold); color:black; text-decoration:none; font-weight:bold; border-radius:4px;">OBTER RELATÓRIO COMPLETO</a>
    </div>
</div>

<script>
    const i18n = {
        'pt': { title: "BIOSYNC | PROTOCOLO DE LONGEVIDADE", btn: "GERAR PROJEÇÃO", res: "Projeção Analítica", qs: ["Qualidade do sono?", "Estresse oxidativo?", "Vegetais crucíferos?", "Treino de força?", "Gestão de cortisol?", "Propósito vital?", "Hidratação?", "Exposição solar?", "Mindfulness?", "Ingestão de açúcares?", "Recuperação?", "Biomarcadores?", "Atividade aeróbica?", "Composição corporal?", "Toxinas?", "Engajamento social?", "Estímulo cognitivo?", "Diversidade de frutas?", "Mobilidade?", "Higiene luminosa?", "Aditivos?", "Postura biomecânica?", "Gorduras saudáveis?", "Foco?", "Saúde metabólica?"] },
        'en': { title: "BIOSYNC | LONGEVITY PROTOCOL", btn: "GENERATE PROJECTION", res: "Analytical Projection", qs: ["Deep sleep quality?", "Oxidative stress?", "Cruciferous intake?", "Resistance training?", "Cortisol management?", "Vital purpose?", "Hydration?", "Sun exposure?", "Mindfulness?", "Sugar intake?", "Recovery?", "Biomarkers?", "Aerobic activity?", "Body composition?", "Toxins?", "Social engagement?", "Cognitive stimulation?", "Fruit diversity?", "Mobility?", "Light hygiene?", "Additives?", "Biomechanical posture?", "Healthy fats?", "Focus?", "Metabolic health?"] },
        'es': { title: "BIOSYNC | PROTOCOLO DE LONGEVIDAD", btn: "GERAR PROYECCIÓN", res: "Proyección Analítica", qs: ["¿Calidad del sueño?", "¿Estrés oxidativo?", "¿Vegetales crucíferos?", "¿Ejercicio de fuerza?", "¿Gestión del cortisol?", "¿Propósito vital?", "¿Hidratación?", "¿Exposición solar?", "¿Mindfulness?", "¿Ingesta de azúcares?", "¿Recuperación?", "¿Biomarcadores?", "¿Actividad aeróbica?", "¿Composición corporal?", "¿Toxinas?", "¿Compromiso social?", "¿Estímulo cognitivo?", "¿Diversidad de frutas?", "¿Movilidad?", "¿Higiene lumínica?", "¿Aditivos?", "¿Postura biomecánica?", "¿Grasas saludables?", "¿Enfoque?", "¿Salud metabólica?"] }
    };

    function setLang(lang) {
        document.getElementById('title').innerText = i18n[lang].title;
        document.getElementById('submit').innerText = i18n[lang].btn;
        document.getElementById('res-title').innerText = i18n[lang].res;
        const qElements = document.querySelectorAll('.q-text');
        i18n[lang].qs.forEach((text, i) => { if(qElements[i]) qElements[i].innerText = (i + 1) + ". " + text; });
    }

    const container = document.getElementById('questions-container');
    i18n['pt'].qs.forEach((q, i) => {
        let opts = "";
        for(let n=1; n<=5; n++) opts += `<button class="opt" onclick="select(this)">${n}</button>`;
        container.innerHTML += `<div class="q-group"><div class="q-text">${i+1}. ${q}</div><div class="options">${opts}</div></div>`;
    });

    function select(el) { el.parentElement.querySelectorAll('.opt').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    function showResults() { document.getElementById('survey').classList.add('hidden'); document.getElementById('results').classList.remove('hidden'); document.getElementById('score').innerText = "85 Anos"; }
</script>
</body>
</html>
