<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>BioSync | Longevity Protocol</title>
    <style>
        :root { --gold: #C5A059; }
        body { background-color: #050505; color: #d1d1d1; font-family: 'Georgia', serif; margin: 0; padding: 20px; }
        .wrapper { max-width: 700px; margin: 0 auto; border: 1px solid #1a1a1a; padding: 40px; border-radius: 8px; background: #080808; }
        h1 { color: var(--gold); text-align: center; letter-spacing: 3px; font-size: 20px; }
        .q-group { margin-bottom: 20px; border-bottom: 1px solid #151515; padding-bottom: 15px; }
        .opt { width: 32px; height: 32px; border: 1px solid #333; background: transparent; color: #777; cursor: pointer; }
        .opt.active { border-color: var(--gold); color: var(--gold); }
        button#submit { width: 100%; padding: 15px; background: var(--gold); color: black; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Seletor de Idioma -->
    <div style="text-align: center; margin-bottom: 20px;">
        <button onclick="setLang('pt')" style="background:none; border:1px solid #C5A059; color:#C5A059; cursor:pointer; padding:5px;">PT</button>
        <button onclick="setLang('en')" style="background:none; border:1px solid #C5A059; color:#C5A059; cursor:pointer; padding:5px;">EN</button>
        <button onclick="setLang('es')" style="background:none; border:1px solid #C5A059; color:#C5A059; cursor:pointer; padding:5px;">ES</button>
    </div>

    <h1 id="title">BIOSYNC | PROTOCOLO DE LONGEVIDADE</h1>
    
    <div id="survey">
        <div class="q-group">
            <label>Idade: <input type="number" id="age"></label>
            <label>Pai (falecimento): <input type="number" id="dadAge"></label>
            <label>Mãe (falecimento): <input type="number" id="momAge"></label>
        </div>
        <div id="questions-container"></div>
        <button id="submit" onclick="showResults()">GERAR PROJEÇÃO</button>
    </div>

    <div id="results" class="hidden">
        <h2 id="res-title" style="color:var(--gold)">Projeção Analítica</h2>
        <p id="res-text">Sua expectativa estimada é de: <strong id="score" style="font-size:24px;"></strong></p>
        <a href="COLE_AQUI_O_SEU_LINK_DA_HOTMART" style="display:block; text-align:center; padding:15px; background:var(--gold); color:black; font-weight:bold; text-decoration:none; margin-top:20px;">OBTER RELATÓRIO COMPLETO</a>
    </div>
</div>

<script>
    const qs = ["Sono profundo?", "Estresse oxidativo?", "Vegetais crucíferos?", "Treino de força?", "Gestão de cortisol?", "Propósito vital?", "Hidratação?", "Exposição solar?", "Mindfulness?", "Ingestão de açúcares?", "Recuperação?", "Biomarcadores?", "Atividade aeróbica?", "Composição corporal?", "Toxinas?", "Engajamento social?", "Estímulo cognitivo?", "Diversidade de frutas?", "Mobilidade?", "Higiene luminosa?", "Aditivos?", "Postura biomecânica?", "Gorduras saudáveis?", "Foco?", "Saúde metabólica?"];
    
    // Inserção das perguntas
    const container = document.getElementById('questions-container');
    qs.forEach((q, i) => {
        let opts = "";
        for(let n=1; n<=10; n++) opts += `<button class="opt" onclick="select(this)">${n}</button>`;
        container.innerHTML += `<div class="q-group"><div>${i+1}. ${q}</div><div class="options">${opts}</div></div>`;
    });

    function select(el) { el.parentElement.querySelectorAll('.opt').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
    
    function setLang(lang) {
        const texts = {
            'pt': {title: "BIOSYNC | PROTOCOLO DE LONGEVIDADE", btn: "GERAR PROJEÇÃO", res: "Projeção Analítica"},
            'en': {title: "BIOSYNC | LONGEVITY PROTOCOL", btn: "GENERATE PROJECTION", res: "Analytical Projection"},
            'es': {title: "BIOSYNC | PROTOCOLO DE LONGEVIDAD", btn: "GENERAR PROYECCIÓN", res: "Proyección Analítica"}
        };
        document.getElementById('title').innerText = texts[lang].title;
        document.getElementById('submit').innerText = texts[lang].btn;
        document.getElementById('res-title').innerText = texts[lang].res;
    }

    function showResults() {
        document.getElementById('survey').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('score').innerText = (78 + Math.floor(Math.random() * 22)) + " Anos";
    }
</script>
</body>
</html>
